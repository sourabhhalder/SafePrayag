services:
  - type: web
    name: safeprayag-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: sh start.sh
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FAST2SMS_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://safeprayag-frontend.vercel.app,https://safeprayag.vercel.app
    autoDeploy: true
